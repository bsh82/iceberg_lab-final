apiVersion: v1
kind: ConfigMap
metadata:
  name: trino-config
  namespace: criteo-lakehouse
data:
  config.properties: |
    coordinator=true
    node-scheduler.include-coordinator=true
    http-server.http.port=8080
    discovery.uri=http://localhost:8080
    query.max-memory=2GB
    query.max-memory-per-node=1GB
  jvm.config: |
    -server
    -Xmx2G
    -XX:+UnlockDiagnosticVMOptions
    -XX:G1NumCollectionsKeepPinned=10000000
    -XX:+UseG1GC
    -XX:G1HeapRegionSize=32M
    -XX:+ExplicitGCInvokesConcurrent
    -XX:+HeapDumpOnOutOfMemoryError
  node.properties: |
    node.environment=local
    node.id=trino-local-coordinator
    node.data-dir=/data/trino
  iceberg.properties: |
    connector.name=iceberg
    iceberg.catalog.type=glue
    hive.metastore.glue.region=ap-northeast-2
    iceberg.file-format=PARQUET
    iceberg.compression-codec=ZSTD
    fs.native-s3.enabled=true
    s3.region=ap-northeast-2
---
apiVersion: v1
kind: Service
metadata:
  name: trino
  namespace: criteo-lakehouse
spec:
  selector:
    app: trino
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trino
  namespace: criteo-lakehouse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trino
  template:
    metadata:
      labels:
        app: trino
    spec:
      containers:
        - name: trino
          image: trinodb/trino:449
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: AWS_PROFILE
              value: iceberg-lab
            - name: AWS_REGION
              value: ap-northeast-2
            - name: AWS_SHARED_CREDENTIALS_FILE
              value: /home/trino/.aws/credentials
            - name: AWS_CONFIG_FILE
              value: /home/trino/.aws/config
          volumeMounts:
            - name: config
              mountPath: /etc/trino/config.properties
              subPath: config.properties
            - name: config
              mountPath: /etc/trino/jvm.config
              subPath: jvm.config
            - name: config
              mountPath: /etc/trino/node.properties
              subPath: node.properties
            - name: config
              mountPath: /etc/trino/catalog/iceberg.properties
              subPath: iceberg.properties
            - name: aws-credentials
              mountPath: /home/trino/.aws
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: trino-config
        - name: aws-credentials
          secret:
            secretName: aws-credentials
            optional: true
