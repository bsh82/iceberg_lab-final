apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: criteo-silver-to-gold
  namespace: criteo-lakehouse
spec:
  type: Python
  pythonVersion: "3"
  mode: cluster
  image: criteo-spark:local
  imagePullPolicy: IfNotPresent
  mainApplicationFile: local:///opt/project/code/pipelines/silver_to_gold.py
  sparkVersion: 3.5.5
  restartPolicy:
    type: Never
  arguments:
    - "--start-date"
    - "2026-05-10"
    - "--end-date"
    - "2026-05-10"
  driver:
    serviceAccount: spark
    cores: 1
    memory: 768m
    memoryOverhead: 384m
    env:
      - name: AWS_PROFILE
        value: iceberg-lab
      - name: AWS_REGION
        value: ap-northeast-2
      - name: AWS_SHARED_CREDENTIALS_FILE
        value: /home/spark/.aws/credentials
      - name: AWS_CONFIG_FILE
        value: /home/spark/.aws/config
      - name: SPARK_SQL_SHUFFLE_PARTITIONS
        value: "8"
    volumeMounts:
      - name: aws-credentials
        mountPath: /home/spark/.aws
        readOnly: true
      - name: code-overrides
        mountPath: /opt/project/code/common/spark.py
        subPath: spark.py
  executor:
    instances: 1
    cores: 1
    memory: 768m
    memoryOverhead: 384m
    env:
      - name: AWS_PROFILE
        value: iceberg-lab
      - name: AWS_REGION
        value: ap-northeast-2
      - name: AWS_SHARED_CREDENTIALS_FILE
        value: /home/spark/.aws/credentials
      - name: AWS_CONFIG_FILE
        value: /home/spark/.aws/config
      - name: SPARK_SQL_SHUFFLE_PARTITIONS
        value: "8"
    volumeMounts:
      - name: aws-credentials
        mountPath: /home/spark/.aws
        readOnly: true
      - name: code-overrides
        mountPath: /opt/project/code/common/spark.py
        subPath: spark.py
  volumes:
    - name: aws-credentials
      secret:
        secretName: aws-credentials
        optional: true
    - name: code-overrides
      configMap:
        name: criteo-code-overrides
